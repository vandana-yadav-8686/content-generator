# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: repurposer-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: CORS_ORIGINS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: content_repurposing
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /tmp/settings.db
